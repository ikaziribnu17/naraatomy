<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi: Campuran Homogen - X-MATTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --blue-light: #82B2D8;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --bg-white: #F2F3F6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .canvas {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background-color: var(--bg-white);
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            padding: 40px;
            background-image: radial-gradient(circle at 80% 50%, rgba(239, 178, 91, 0.05) 0%, transparent 60%);
        }

        .content-wrapper {
            display: flex;
            width: 100%;
            gap: 40px;
            align-items: center;
            z-index: 10;
        }

        /* Panel Kiri: Teks Materi */
        .text-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-title {
            color: var(--navy);
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
            border-bottom: 4px solid var(--accent-orange);
            display: inline-block;
            padding-bottom: 5px;
            align-self: flex-start;
        }

        .materi-text {
            background-color: white;
            border-left: 6px solid var(--navy);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(61, 84, 116, 0.1);
            margin-bottom: 20px;
        }

        .materi-text p {
            color: var(--navy);
            font-size: 16px;
            line-height: 1.7;
            font-weight: 500;
        }

        .contoh-box {
            background-color: rgba(38, 165, 203, 0.1);
            border: 2px dashed var(--cyan);
            padding: 15px 20px;
            border-radius: 12px;
        }

        .contoh-box strong {
            color: var(--navy);
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .contoh-box p {
            color: var(--navy);
            font-size: 15px;
            font-weight: 500;
        }

        /* Panel Kanan: Simulasi Gelas & Slider */
        .visual-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(101, 134, 177, 0.15);
            border: 2px solid var(--blue-light);
        }

        .glass-container {
            position: relative;
            width: 140px;
            height: 180px;
            border: 4px solid rgba(101, 134, 177, 0.5);
            border-top: none;
            border-radius: 0 0 20px 20px;
            overflow: hidden;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.8);
        }

        .liquid-base {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75%;
            background-color: #b3e5fc; /* Warna air murni */
        }

        .liquid-syrup {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75%;
            background-color: #e53935; /* Warna sirup merah */
            opacity: 0; /* Mulai dari transparan */
            transition: opacity 0.1s;
        }

        /* Komponen Slider */
        .slider-container {
            width: 100%;
            text-align: center;
        }

        .slider-label {
            color: var(--navy);
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            font-size: 14px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 80%;
            margin: 10px 0;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: var(--blue-light);
            border-radius: 5px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent-orange);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .btn-next {
            position: absolute;
            bottom: 40px; right: 40px;
            padding: 12px 25px;
            background-color: var(--accent-orange);
            color: white;
            border: none; border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700; font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0px #d49a4a;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="content-wrapper">
            
            <div class="text-panel">
                <h1 class="header-title">Campuran Homogen</h1>
                
                <div class="materi-text">
                    <p>"<strong>Campuran Homogen (Larutan)</strong> adalah campuran yang zat penyusunnya tercampur sempurna sehingga tidak dapat dibedakan lagi batas antara zat-zat penyusunnya."</p>
                </div>

                <div class="contoh-box">
                    <strong>Contoh:</strong>
                    <p>🍹 Air Sirup, 🌬️ Udara, dan 🥉 Perunggu.</p>
                </div>
            </div>

            <div class="visual-panel">
                <div class="glass-container">
                    <div class="liquid-base"></div>
                    <div class="liquid-syrup" id="syrupLayer"></div>
                </div>
                
                <div class="slider-container">
                    <span class="slider-label">Tuangkan Sirup ke dalam Air</span>
                    <input type="range" min="0" max="100" value="0" id="mixSlider">
                </div>
            </div>

        </div>

        <button class="btn-next" onclick="alert('Pindah ke materi Heterogen!')">LANJUT ➔</button>
    </div>

    <script>
        const slider = document.getElementById('mixSlider');
        const syrupLayer = document.getElementById('syrupLayer');

        // Logika Slider Interaktif
        slider.addEventListener('input', function() {
            // Nilai opacity bergerak dari 0 (air) ke 1 (sirup merah)
            let opacityValue = this.value / 100;
            syrupLayer.style.opacity = opacityValue;
            
            // Simulasi Trigger Storyline jika mencapai 100%
            if (this.value == 100) {
                // Bisa memutar audio / mengganti state di sini
            }
        });
    </script>
</body>
</html>
