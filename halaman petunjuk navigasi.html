<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petunjuk Navigasi - ATOMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS GLOBAL & LAYOUT ANTI-TERPOTONG */
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --success-green: #2ecc71;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Anti-terpotong: Menggunakan min-height dinamis */
            min-height: 100vh;
            min-height: 100dvh; 
            overflow-x: hidden;
            overflow-y: auto;
            padding: 15px;
        }

        /* KANVAS KONSISTEN 16:9 DESKTOP */
        .canvas {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9; 
            max-height: 95vh;
            
            display: flex;
            flex-direction: column;
            background-image: url('https://raw.githubusercontent.com/ikaziribnu17/xsinuli1/69ec1cd9663e74c43854b5606158d8219a8e26fd/unnamed.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }

        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 35, 55, 0.85); /* Overlay gelap konsisten */
            z-index: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            position: relative;
            z-index: 5;
            justify-content: space-between;
            height: 100%;
        }

        /* HEADER */
        .header-section { text-align: center; margin-bottom: 15px; flex-shrink: 0; }
        .header-title { color: white; font-size: 26px; font-weight: 800; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-bottom: 2px; }
        @media (min-width: 768px) { .header-title { font-size: 32px; } }
        .header-title span { color: var(--accent-orange); }
        .header-subtitle { color: #e2e8f0; font-size: 14px; font-weight: 500; }

        /* AREA KONTEN SPLIT (KIRI & KANAN) */
        .guide-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0; 
            margin-bottom: 10px;
        }
        @media (min-width: 768px) {
            .guide-area { flex-direction: row; }
        }

        /* PANEL KIRI (Daftar Menu Interaksi) */
        .guide-list {
            flex: 0.35;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .guide-btn {
            background: var(--glass-bg);
            border: 3px solid transparent;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-family: 'Poppins', sans-serif;
            text-align: left;
        }

        .guide-btn:hover, .guide-btn.active {
            transform: translateX(5px);
            border-color: var(--cyan);
            background: #ffffff;
        }
        
        .guide-btn.active { border-left: 6px solid var(--accent-orange); border-top-color: transparent; border-right-color: transparent; border-bottom-color: transparent;}

        .icon-box {
            font-size: 22px;
            background: rgba(38, 165, 203, 0.1);
            width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 8px; flex-shrink: 0;
        }

        .guide-text h3 { font-size: 14px; color: var(--navy); font-weight: 700; margin: 0; }
        .guide-text p { font-size: 11.5px; color: #64748b; margin: 0; font-weight: 500; }

        /* PANEL KANAN (Detail Informasi) */
        .guide-details {
            flex: 0.65;
            background: var(--glass-bg);
            border-radius: 16px;
            border-top: 6px solid var(--cyan);
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }

        #infoIcon { font-size: 60px; margin-bottom: 15px; opacity: 0.5; transition: 0.4s; }
        #infoTitle { font-size: 22px; color: var(--navy); font-weight: 800; margin-bottom: 10px; transition: 0.4s; }
        #infoDesc { font-size: 14px; color: #333; line-height: 1.6; font-weight: 500; transition: 0.4s; }
        
        .demo-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            pointer-events: none; /* Hanya untuk visual */
        }

        /* ANIMASI FADE */
        .fade-update { animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TOMBOL BAWAH */
        .bottom-actions { 
            display: flex; justify-content: center; align-items: center; 
            padding-top: 10px; border-top: 2px solid #cbd5e1; flex-shrink: 0;
        }
        @media (min-width: 768px) { .bottom-actions { justify-content: flex-start; } }
        
        .btn-action { 
            padding: 12px 24px; border: none; border-radius: 10px; font-family: 'Poppins', sans-serif; 
            font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s; width: 100%; text-align: center;
        }
        @media (min-width: 768px) { .btn-action { width: auto; font-size: 15px;} }
        
        .btn-back { background-color: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white; backdrop-filter: blur(5px); }
        .btn-back:hover { background-color: white; color: var(--navy); transform: translateY(-2px); }

        /* RESPONSIVE MOBILE (Melepas Rasio 16:9) */
        @media (max-width: 768px) {
            .canvas {
                aspect-ratio: auto;
                min-height: 92dvh;
                max-height: none;
            }
            .main-content { padding: 15px; }
            .guide-list { flex: none; flex-direction: row; overflow-x: auto; padding-bottom: 5px; }
            .guide-btn { min-width: 200px; padding: 10px; }
            .guide-details { flex: none; min-height: 250px; padding: 15px; justify-content: flex-start; margin-top: 10px;}
            #infoIcon { font-size: 40px; margin-bottom: 10px; }
            #infoTitle { font-size: 18px; }
            #infoDesc { font-size: 13px; }
        }

        /* Kustomisasi Scrollbar */
        .guide-list::-webkit-scrollbar { height: 5px; width: 5px;}
        .guide-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .guide-list::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
        .guide-details::-webkit-scrollbar { width: 5px; }
        .guide-details::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="main-content">
            
            <div class="header-section">
                <h1 class="header-title">Petunjuk <span>Navigasi</span></h1>
                <p class="header-subtitle">Pelajari cara menggunakan berbagai fitur interaktif di ATOMY</p>
            </div>

            <div class="guide-area">
                
                <div class="guide-list">
                    <button class="guide-btn" onmouseover="updateInfo('drag')" onclick="updateInfo('drag')">
                        <div class="icon-box">✋</div>
                        <div class="guide-text">
                            <h3>Tarik & Lepas</h3>
                            <p>Drag and Drop</p>
                        </div>
                    </button>
                    
                    <button class="guide-btn" onmouseover="updateInfo('slider')" onclick="updateInfo('slider')">
                        <div class="icon-box">🎚️</div>
                        <div class="guide-text">
                            <h3>Geser Slider</h3>
                            <p>Kontrol Alat Lab</p>
                        </div>
                    </button>

                    <button class="guide-btn" onmouseover="updateInfo('check')" onclick="updateInfo('check')">
                        <div class="icon-box">✔️</div>
                        <div class="guide-text">
                            <h3>Periksa Jawaban</h3>
                            <p>Validasi Kuis</p>
                        </div>
                    </button>

                    <button class="guide-btn" onmouseover="updateInfo('reset')" onclick="updateInfo('reset')">
                        <div class="icon-box">🔄</div>
                        <div class="guide-text">
                            <h3>Ulangi Percobaan</h3>
                            <p>Reset Alat</p>
                        </div>
                    </button>

                    <button class="guide-btn" onmouseover="updateInfo('nav')" onclick="updateInfo('nav')">
                        <div class="icon-box">➔</div>
                        <div class="guide-text">
                            <h3>Tombol Navigasi</h3>
                            <p>Pindah Halaman</p>
                        </div>
                    </button>
                </div>

                <div class="guide-details" id="infoPanel">
                    <div id="infoIcon">⚙️</div>
                    <div id="infoTitle">Pusat Navigasi</div>
                    <div id="infoDesc">
                        Sentuh atau arahkan kursor (hover) ke salah satu menu di sebelah kiri untuk membaca penjelasan detail mengenai fungsinya dalam aplikasi ATOMY.
                    </div>
                </div>

            </div>

            <div class="bottom-actions">
                <button class="btn-action btn-back" onclick="window.location.href='halaman beranda.html'">
                    ⬅ KEMBALI KE BERANDA
                </button>
            </div>

        </div>
    </div>

    <script>
        // Data Informasi Navigasi sesuai dengan interaksi di aplikasi ATOMY
        const infoData = {
            'drag': {
                icon: '✋',
                title: 'Tarik & Lepas (Drag & Drop)',
                color: 'var(--accent-orange)',
                desc: 'Fitur ini sangat sering digunakan dalam kuis dan laboratorium maya. Sentuh dan tahan objek (seperti <b>partikel atom</b>, <b>kotak materi</b>, atau <b>gelas kimia kotor</b>), lalu seret ke tempat yang tepat (keranjang/slot putus-putus).<br><br><span style="color:var(--navy); font-weight:800; font-size:12px;">💡 Tips: Di HP, cukup tahan objek dengan jari lalu geser.</span>'
            },
            'slider': {
                icon: '🎚️',
                title: 'Geser Slider',
                color: 'var(--error-red)',
                desc: 'Pada <b>Laboratorium Maya Destilasi & Evaporasi</b>, kamu akan menemukan <i>slider</i> di bagian bawah alat. Geser bulatan ke arah kanan untuk menaikkan suhu pemanas (Bunsen) hingga mencapai 100°C untuk melihat reaksi penguapan.'
            },
            'check': {
                icon: '✔️',
                title: 'Tombol Periksa Jawaban',
                color: 'var(--success-green)',
                desc: 'Setelah kamu menyusun puzzle atom atau menyortir materi, tekan tombol berwarna <b style="color:var(--success-green);">Hijau</b> di bawah layar untuk mengecek jawabanmu. Jika salah, kotak akan bergetar merah dan kamu bisa memperbaikinya!<br><br><div class="demo-btn" style="background:var(--success-green); color:white;">PERIKSA JAWABAN ✔️</div>'
            },
            'reset': {
                icon: '🔄',
                title: 'Tombol Ulangi Percobaan',
                color: 'var(--cyan)',
                desc: 'Melakukan kesalahan di Laboratorium Maya? Jangan khawatir! Klik tombol berwarna biru cerah ini di panel sebelah kiri untuk mereset seluruh alat praktikum ke kondisi semula tanpa harus merefresh halaman.<br><br><div class="demo-btn" style="background:var(--cyan); color:white;">🔄 Ulangi Percobaan</div>'
            },
            'nav': {
                icon: '➔',
                title: 'Tombol Kembali / Selanjutnya',
                color: 'var(--navy)',
                desc: 'Gunakan tombol di bagian bawah layar untuk berpindah antar materi. Tombol <b style="color:var(--navy);">KEMBALI</b> yang transparan digunakan untuk mundur, sedangkan tombol <b style="color:var(--accent-orange);">SELANJUTNYA</b> berwarna oranye digunakan untuk melanjutkan petualanganmu.<br><br><div class="demo-btn" style="background:var(--accent-orange); color:white;">SELANJUTNYA ➔</div>'
            }
        };

        const infoIcon = document.getElementById('infoIcon');
        const infoTitle = document.getElementById('infoTitle');
        const infoDesc = document.getElementById('infoDesc');
        const buttons = document.querySelectorAll('.guide-btn');

        function updateInfo(key) {
            // Hapus status aktif dari semua tombol
            buttons.forEach(btn => btn.classList.remove('active'));
            // Tambahkan status aktif ke tombol yang diklik
            event.currentTarget.classList.add('active');

            const data = infoData[key];
            
            // Reset animasi
            infoIcon.classList.remove('fade-update');
            infoTitle.classList.remove('fade-update');
            infoDesc.classList.remove('fade-update');

            // Set timeout kecil untuk memicu ulang animasi CSS
            setTimeout(() => {
                infoIcon.innerText = data.icon;
                infoTitle.innerText = data.title;
                infoDesc.innerHTML = data.desc;
                
                infoIcon.style.opacity = "1";
                infoTitle.style.color = data.color;

                // Tambahkan class animasi
                infoIcon.classList.add('fade-update');
                infoTitle.classList.add('fade-update');
                infoDesc.classList.add('fade-update');
            }, 10);
        }
    </script>

</body>
</html>
