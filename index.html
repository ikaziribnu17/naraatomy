<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login ATOMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --blue-light: #82B2D8;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --bg-white: #F2F3F6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container 16:9 */
        .canvas {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            /* Background image diatur di sini */
            background-image: url('https://raw.githubusercontent.com/ikaziribnu17/xsinuli1/69ec1cd9663e74c43854b5606158d8219a8e26fd/unnamed.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Layout Kiri & Kanan */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        /* Overlay gelap agar teks & form lebih terbaca di atas gambar background */
        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 30, 50, 0.4);
            z-index: 1;
        }

        /* Teks Judul Besar di Kiri */
        .hero-text {
            position: relative;
            z-index: 10;
            color: white;
            max-width: 50%;
        }

        .hero-text .main-title {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            color: #ffffff;
        }

        .hero-text .sub-title {
            font-size: 26px;
            font-weight: 500;
            color: #f1f5f9;
            text-shadow: 1px 2px 10px rgba(0, 0, 0, 0.5);
            line-height: 1.4;
        }

        /* Card Login di Kanan */
        .login-card {
            background: white;
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            border-top: 8px solid var(--navy);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            z-index: 10;
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--navy);
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--blue-medium);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fcfcfc;
            color: var(--navy);
        }

        input::placeholder {
            color: rgba(101, 134, 177, 0.4);
            font-weight: 400;
        }

        input:focus {
            outline: none;
            border-color: var(--cyan);
            background: white;
            box-shadow: 0 0 0 4px rgba(38, 165, 203, 0.1);
        }

        .btn-start {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 4px 0px #d49a4a;
        }

        .btn-start:hover {
            background-color: #f2bc6b;
            transform: translateY(-2px);
            box-shadow: 0 6px 0px #d49a4a;
        }

        .btn-start:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0px #d49a4a;
        }
        
        @media (max-width: 900px) {
            .canvas {
                flex-direction: column;
                justify-content: center;
                padding: 40px;
            }
            .hero-text {
                max-width: 100%;
                text-align: center;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="hero-text">
            <div class="main-title">ATOMY</div>
            <div class="sub-title">Unsur, Senyawa,<br>dan Campuran</div>
        </div>

        <div class="login-card">
            <h1>Mulai Belajar</h1>
            <p class="subtitle">Isi data dirimu sebelum memulai</p>
            
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="playerName" placeholder="Masukkan nama..." autocomplete="off">
            </div>

            <div class="form-group">
                <label>Sekolah</label>
                <input type="text" id="playerSchool" placeholder="Masukkan nama sekolah..." autocomplete="off">
            </div>

            <button class="btn-start" onclick="startApp()">MULAI BELAJAR</button>
        </div>
    </div>

    <script>
        function startApp() {
            const name = document.getElementById('playerName').value.trim();
            const school = document.getElementById('playerSchool').value.trim();

            if (name === "" || school === "") {
                alert("Ups! Silakan isi nama dan sekolahmu dulu ya.");
                return;
            }

            sessionStorage.setItem('xmatter_name', name);
            sessionStorage.setItem('xmatter_school', school);

            // GANTI "nama_file_selanjutnya.html" DENGAN NAMA FILE HTML TUJUANMU
            window.location.href = "Halaman beranda.html";
        }
    </script>
</body>
</html>
