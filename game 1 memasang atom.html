<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis 2: Puzzle Partikel - ATOMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --blue-light: #82B2D8;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
            --proton-color: #e74c3c;
            --neutron-color: #f1c40f;
            --electron-color: #3498db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Menggunakan min-height agar bisa memanjang jika konten banyak */
            min-height: 100dvh; 
            /* Hapus overflow: hidden agar bisa scroll di layar kecil */
            overflow-x: hidden; 
            overflow-y: auto;
            padding: 10px; /* Memberi jarak aman dari tepi layar */
        }

        .canvas {
            width: 100%;
            max-width: 1100px;
            /* Flex column untuk mengatur tinggi anak-anaknya */
            display: flex;
            flex-direction: column;
            /* Menggunakan min-height dinamis, maksimal setinggi layar */
            min-height: 90dvh; 
            max-height: 95dvh;
            background-image: url('https://raw.githubusercontent.com/ikaziribnu17/xsinuli1/69ec1cd9663e74c43854b5606158d8219a8e26fd/unnamed.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            border-radius: 12px;
            overflow: hidden; /* Hanya potong yang keluar dari canvas */
        }

        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 35, 55, 0.75);
            z-index: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px 20px; /* Padding dikurangi untuk mobile */
            position: relative;
            z-index: 5;
            justify-content: space-between;
            height: 100%;
        }

        .header-section {
            text-align: center;
            margin-bottom: 10px; /* Sedikit direnggangkan */
            flex-shrink: 0; /* Pastikan header tidak mengecil */
        }

        .header-title {
            color: white;
            font-size: 24px; /* Sedikit dikecilkan untuk mobile */
            font-weight: 800;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 2px;
        }
        @media (min-width: 768px) {
            .header-title { font-size: 28px; } /* Ukuran desktop */
        }
        .header-title span { color: var(--accent-orange); }

        .header-subtitle {
            color: #e2e8f0;
            font-size: 14px; /* Disesuaikan */
            font-weight: 500;
        }

        /* AREA GAME PUZZLE */
        .game-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            border-top: 6px solid var(--cyan);
            padding: 15px; /* Padding game area */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            /* Default column untuk mobile */
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            gap: 20px; /* Jarak antar elemen di game area */
            min-height: 0; /* Penting untuk mencegah konten tumpah di flexbox */
            overflow-y: auto; /* Izinkan scroll di dalam area game jika sangat sempit */
        }

        /* Switch ke baris untuk desktop */
        @media (min-width: 768px) {
            .game-area {
                flex-direction: row;
                gap: 40px;
            }
        }

        .level-indicator { 
            background: var(--navy); 
            color: white; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            /* Di desktop, posisikan absolut di pojok */
            margin-bottom: 10px;
        }
        @media (min-width: 768px) {
            .level-indicator {
                position: absolute;
                top: 15px;
                left: 15px;
                margin-bottom: 0;
            }
        }

        /* --- DESAIN ATOM --- */
        .atom-board {
            position: relative;
            /* Gunakan vw/vh untuk responsivitas maksimal, batasi dengan min/max */
            width: 70vw; 
            height: 70vw;
            max-width: 320px;
            max-height: 320px;
            background: radial-gradient(circle, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 50%;
            border: 3px dashed var(--blue-medium);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            flex-shrink: 0; /* Pastikan board tidak gepeng */
        }

        .nucleus {
            width: 45%; /* Relatif terhadap board */
            height: 45%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom lebih rapat untuk mobile */
            gap: 2px;
            justify-items: center;
            align-items: center;
            padding: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 0 15px rgba(38, 165, 203, 0.2);
            z-index: 3;
        }
        @media (min-width: 768px) {
             .nucleus {
                 grid-template-columns: repeat(4, 1fr);
                 gap: 4px;
                 padding: 12px;
             }
        }

        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--blue-light);
        }

        .orbit-1 { width: 65%; height: 65%; z-index: 2; }
        .orbit-2 { width: 90%; height: 90%; z-index: 1; }

        /* SLOT DROPDOWN */
        .drop-slot {
            width: 28px; /* Sedikit lebih kecil untuk mobile */
            height: 28px;
            background: rgba(0,0,0,0.04);
            border: 2px dashed #94a3b8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }
        @media (min-width: 768px) {
            .drop-slot { width: 32px; height: 32px; }
        }

        .electron-slot { position: absolute; }
        
        .drop-slot.filled {
            border: none;
            background: transparent;
        }

        /* KOTAK PARTIKEL */
        .particles-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%; /* Penuhi lebar kontainer di mobile */
            max-width: 300px;
        }
        @media (min-width: 768px) {
            .particles-panel { width: 250px; }
        }

        .particles-box {
            display: flex;
            flex-wrap: wrap;
            gap: 6px; /* Gap lebih kecil */
            background: #ffffff;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--blue-light);
            justify-content: center;
            min-height: 80px;
        }

        .particles-box h3 {
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: var(--navy);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .particle {
            width: 28px; /* Sesuaikan dengan drop-slot */
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            color: white;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-size: 11px;
            transition: transform 0.2s;
            /* Penting untuk drag & drop di mobile */
            touch-action: none; 
        }
        @media (min-width: 768px) {
             .particle { width: 32px; height: 32px; font-size: 13px; }
        }

        .particle.proton { background-color: var(--proton-color); }
        .particle.neutron { background-color: var(--neutron-color); color: #333; }
        .particle.elektron { background-color: var(--electron-color); } /* Ubah dari .electron ke .elektron agar sesuai dengan JS */

        .particle:active { cursor: grabbing; transform: scale(1.1); }

        /* ANIMASI SALAH */
        .error-shake {
            animation: shake 0.4s;
            border-color: var(--error-red) !important;
            background: rgba(231, 76, 60, 0.2);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
        }

        /* TOMBOL & POPUP */
        .bottom-actions { 
            display: flex; 
            justify-content: center; /* Tengah di mobile */
            align-items: center; 
            flex-shrink: 0;
            padding-top: 5px;
        }
        @media (min-width: 768px) {
            .bottom-actions { justify-content: flex-start; }
        }

        .btn-action { 
            padding: 12px 20px; /* Area klik lebih besar untuk jari */
            border: none; 
            border-radius: 10px; 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            width: 100%; /* Penuhi lebar di mobile */
            justify-content: center;
        }
        @media (min-width: 768px) {
            .btn-action { width: auto; font-size: 15px; justify-content: flex-start;}
        }

        .btn-back { background-color: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white; backdrop-filter: blur(5px); }
        .btn-back:hover { background-color: white; color: var(--navy); transform: translateY(-2px); }

        /* Modal Responsif */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 30, 50, 0.85); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.4s; padding: 20px; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { 
            background: #ffffff; 
            width: 100%; 
            max-width: 450px; 
            padding: 30px 20px; /* Padding disesuaikan */
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            transform: scale(0.8); 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-top: 10px solid var(--success-green); 
            max-height: 90vh; /* Cegah modal terlalu tinggi */
            overflow-y: auto;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-content h2 { color: var(--success-green); font-size: 24px; margin-bottom: 10px; font-weight: 800; }
        .modal-content p { color: var(--navy); font-size: 15px; margin-bottom: 25px; font-weight: 500; }
        
        .btn-primary { background-color: var(--accent-orange); color: white; padding: 14px 20px; border: none; border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; box-shadow: 0 5px 0px #c48a30; transition: all 0.3s; }
        .btn-primary:hover { background-color: #f2bc6b; transform: translateY(-2px); box-shadow: 0 7px 0px #c48a30; }
        
        .btn-primary:active { transform: translateY(3px); box-shadow: 0 2px 0px #c48a30; } /* Efek tekan */

    </style>
</head>
<body>

    <div class="canvas">
        <div class="main-content">
            
            <div class="header-section">
                <h1 class="header-title">Fokus, <span id="playerNameDisplay">Pelajar</span>!</h1>
                <p class="header-subtitle" id="instructionText">Tarik partikel ke posisinya untuk membentuk Atom!</p>
            </div>

            <div class="game-area">
                
                <div class="level-indicator" id="levelBadge">LEVEL 1/3</div>

                <div class="atom-board">
                    <div class="orbit orbit-2" id="orbit2"></div>
                    <div class="orbit orbit-1" id="orbit1"></div>
                    <div class="nucleus" id="nucleus"></div>
                </div>

                <div class="particles-panel">
                    <div class="particles-box" id="particleBox">
                        <h3>Pilih Partikel</h3>
                    </div>
                </div>

            </div>

            <div class="bottom-actions">
                <button class="btn-action btn-back" onclick="window.location.href='kuis 1 memasang atom.html'">
                    ⬅ KEMBALI
                </button>
            </div>

        </div>

        <div class="modal-overlay" id="levelPopup">
            <div class="modal-content">
                <h2 id="popupTitle">🌟 Luar Biasa!</h2>
                <p id="popupDesc">Kamu berhasil merakit Atom ini. Siap untuk tingkat kesulitan selanjutnya?</p>
                <button class="btn-primary" id="btnNextAction">
                    LANJUT KE LEVEL BERIKUTNYA ➔
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA LEVEL KUIS (He, C, N)
        const levels = [
            { name: "Helium (He)", p: 2, n: 2, e1: 2, e2: 0 },
            { name: "Carbon (C)", p: 6, n: 6, e1: 2, e2: 4 },
            { name: "Nitrogen (N)", p: 7, n: 7, e1: 2, e2: 5 }
        ];

        let currentLevel = 0;
        let correctPlacements = 0;
        let totalRequired = 0;

        // Tampilkan Nama dari Login
        document.addEventListener("DOMContentLoaded", function() {
            const savedName = sessionStorage.getItem('xmatter_name');
            if (savedName && savedName.trim() !== "") {
                document.getElementById('playerNameDisplay').innerText = savedName;
            }
            loadLevel(currentLevel);
            setupTouchEvents(); // Inisialisasi event sentuh untuk mobile
        });

        // 2. FUNGSI RENDER LEVEL
        function loadLevel(index) {
            correctPlacements = 0;
            const levelData = levels[index];
            totalRequired = levelData.p + levelData.n + levelData.e1 + levelData.e2;

            document.getElementById('instructionText').innerHTML = `Tarik <b>${totalRequired} partikel</b> untuk membentuk <b>Atom ${levelData.name}</b>!`;
            document.getElementById('levelBadge').innerText = `LEVEL ${index + 1} / 3`;

            // Bersihkan Board & Kotak
            const nucleus = document.getElementById('nucleus');
            const orbit1 = document.getElementById('orbit1');
            const orbit2 = document.getElementById('orbit2');
            const pBox = document.getElementById('particleBox');
            
            nucleus.innerHTML = '';
            orbit1.innerHTML = '';
            orbit2.innerHTML = '';
            pBox.innerHTML = '<h3>Pilih Partikel</h3>';

            // Generate Slot Inti Atom (Nukleus)
            let nucleusSlots = [];
            for(let i=0; i<levelData.p; i++) nucleusSlots.push('proton');
            for(let i=0; i<levelData.n; i++) nucleusSlots.push('neutron');
            
            // Acak urutan slot di inti agar terlihat alami
            nucleusSlots.sort(() => Math.random() - 0.5);

            nucleusSlots.forEach(type => {
                let slot = document.createElement('div');
                slot.className = 'drop-slot';
                slot.setAttribute('data-expected', type);
                slot.setAttribute('ondrop', 'drop(event)');
                slot.setAttribute('ondragover', 'allowDrop(event)');
                nucleus.appendChild(slot);
            });

            // Generate Slot Orbit
            createOrbitSlots(orbit1, levelData.e1);
            createOrbitSlots(orbit2, levelData.e2);

            // Generate Item Partikel yang Bisa di-Drag
            for(let i=0; i<levelData.p; i++) createDraggable(pBox, 'proton', 'p+');
            for(let i=0; i<levelData.n; i++) createDraggable(pBox, 'neutron', 'n0');
            for(let i=0; i<levelData.e1 + levelData.e2; i++) createDraggable(pBox, 'elektron', 'e-'); // Konsisten 'elektron'
        }

        // Fungsi mengatur jarak elektron melingkar
        function createOrbitSlots(container, count) {
            if(count === 0) {
                container.style.border = 'none';
                return;
            } else {
                container.style.border = '2px solid var(--blue-light)';
            }

            const radius = 50; 
            
            for(let i = 0; i < count; i++) {
                let angle = (i * (360 / count)) * (Math.PI / 180);
                
                let x = 50 + radius * Math.cos(angle);
                let y = 50 + radius * Math.sin(angle);

                let slot = document.createElement('div');
                slot.className = 'drop-slot electron-slot';
                slot.setAttribute('data-expected', 'elektron');
                slot.setAttribute('ondrop', 'drop(event)');
                slot.setAttribute('ondragover', 'allowDrop(event)');
                
                // Gunakan transform terpusat agar lebih presisi di berbagai ukuran
                slot.style.left = `${x}%`;
                slot.style.top = `${y}%`;
                slot.style.transform = `translate(-50%, -50%)`;
                
                container.appendChild(slot);
            }
        }

        function createDraggable(container, type, text) {
            let item = document.createElement('div');
            item.className = `particle ${type}`;
            item.setAttribute('data-value', type);
            item.setAttribute('draggable', 'true');
            item.id = type + '_' + Math.random().toString(36).substr(2, 5);
            item.innerText = text;
            item.ondragstart = drag;
            container.appendChild(item);
        }

        // 3. LOGIKA DRAG & DROP (DESKTOP)
        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.style.opacity = "0.5";
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drop(ev) {
            ev.preventDefault();
            const draggedId = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(draggedId);
            const slot = ev.target.closest('.drop-slot'); // Memastikan drop ke slot, bukan anak slot
            
            if (!slot || !draggedElement) return;

            draggedElement.style.opacity = "1";

            const expectedValue = slot.getAttribute('data-expected');
            const droppedValue = draggedElement.getAttribute('data-value');

            // Cek kebenaran & pastikan slot kosong
            if (expectedValue === droppedValue && !slot.hasChildNodes()) {
                slot.appendChild(draggedElement);
                slot.classList.add('filled');
                
                draggedElement.setAttribute('draggable', 'false');
                draggedElement.style.cursor = 'default';
                draggedElement.style.boxShadow = 'none';
                draggedElement.style.margin = '0'; 
                // Hapus event touch setelah ditempatkan
                draggedElement.ontouchstart = null;
                draggedElement.ontouchmove = null;
                draggedElement.ontouchend = null;

                correctPlacements++;
                checkWin();
            } else {
                slot.classList.add('error-shake');
                setTimeout(() => slot.classList.remove('error-shake'), 400);
            }
        }

        // 4. LOGIKA DRAG & DROP (MOBILE / TOUCH)
        let draggedItem = null;
        let startX, startY, initialX, initialY;

        function setupTouchEvents() {
            const container = document.getElementById('particleBox');
            
            // Menggunakan event delegation agar item yang baru dibuat ikut terdeteksi
            container.addEventListener('touchstart', handleTouchStart, {passive: false});
            document.addEventListener('touchmove', handleTouchMove, {passive: false});
            document.addEventListener('touchend', handleTouchEnd);
        }

        function handleTouchStart(e) {
            if(e.target.classList.contains('particle') && e.target.getAttribute('draggable') === 'true') {
                e.preventDefault(); // Mencegah scrolling halaman saat menarik partikel
                draggedItem = e.target;
                
                const touch = e.touches[0];
                const rect = draggedItem.getBoundingClientRect();
                
                // Hitung offset sentuhan dari tengah elemen
                startX = touch.clientX - rect.left - rect.width/2;
                startY = touch.clientY - rect.top - rect.height/2;
                
                // Simpan posisi awal untuk dikembalikan jika salah tempat
                initialX = draggedItem.offsetLeft;
                initialY = draggedItem.offsetTop;

                draggedItem.style.position = 'absolute';
                draggedItem.style.zIndex = '1000';
                draggedItem.style.opacity = '0.8';
                
                // Set posisi awal absolute berdasarkan parent
                moveItem(touch.clientX, touch.clientY);
            }
        }

        function handleTouchMove(e) {
            if(draggedItem) {
                e.preventDefault();
                const touch = e.touches[0];
                moveItem(touch.clientX, touch.clientY);
            }
        }

        function moveItem(clientX, clientY) {
            // Tempatkan elemen tepat di bawah jari
            draggedItem.style.left = (clientX - startX - draggedItem.offsetWidth/2) + 'px';
            draggedItem.style.top = (clientY - startY - draggedItem.offsetHeight/2) + 'px';
        }

        function handleTouchEnd(e) {
            if(draggedItem) {
                draggedItem.style.opacity = '1';
                draggedItem.style.zIndex = '';
                
                const touch = e.changedTouches[0];
                // Sembunyikan elemen sementara untuk mencari elemen apa yang ada di bawahnya
                draggedItem.style.visibility = 'hidden';
                const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                draggedItem.style.visibility = 'visible';

                const slot = elementBelow ? elementBelow.closest('.drop-slot') : null;

                if (slot) {
                    const expectedValue = slot.getAttribute('data-expected');
                    const droppedValue = draggedItem.getAttribute('data-value');

                    if (expectedValue === droppedValue && !slot.hasChildNodes()) {
                        // Reset style yang diubah saat drag
                        draggedItem.style.position = 'static';
                        draggedItem.style.left = 'auto';
                        draggedItem.style.top = 'auto';
                        
                        slot.appendChild(draggedItem);
                        slot.classList.add('filled');
                        
                        draggedItem.setAttribute('draggable', 'false');
                        draggedItem.style.cursor = 'default';
                        draggedItem.style.boxShadow = 'none';

                        correctPlacements++;
                        checkWin();
                    } else {
                        // Salah slot, kembalikan posisi
                        returnToInitialPos(slot);
                    }
                } else {
                    // Dilepas di luar area drop, kembalikan posisi
                    returnToInitialPos();
                }
                
                draggedItem = null;
            }
        }

        function returnToInitialPos(errorSlot = null) {
            if(errorSlot) {
                errorSlot.classList.add('error-shake');
                setTimeout(() => errorSlot.classList.remove('error-shake'), 400);
            }
            draggedItem.style.position = 'static';
            draggedItem.style.left = 'auto';
            draggedItem.style.top = 'auto';
        }


        function checkWin() {
            if (correctPlacements === totalRequired) {
                setTimeout(() => {
                    showPopup();
                }, 500);
            }
        }

        // 5. LOGIKA PERPINDAHAN LEVEL & POPUP
        function showPopup() {
            const popup = document.getElementById('levelPopup');
            const title = document.getElementById('popupTitle');
            const desc = document.getElementById('popupDesc');
            const btn = document.getElementById('btnNextAction');

            if (currentLevel < levels.length - 1) {
                title.innerText = "🌟 Susunan Sempurna!";
                desc.innerText = `Kamu berhasil merakit Atom ${levels[currentLevel].name}. Mari kita coba unsur yang lebih kompleks!`;
                btn.innerText = "LANJUT LEVEL BERIKUTNYA ➔";
                btn.onclick = () => {
                    popup.classList.remove('active');
                    currentLevel++;
                    loadLevel(currentLevel);
                };
            } else {
                title.innerText = "🏆 Master Partikel!";
                desc.innerText = "Kamu berhasil menyelesaikan seluruh puzzle Atom tanpa kesalahan!";
                btn.innerText = "LANJUT KE KUIS 3 (MENJODOHKAN) ➔";
                btn.onclick = () => {
                    window.location.href = 'kuis 2 menjodohkan.html';
                };
            }
            popup.classList.add('active');
        }

        document.addEventListener('dragend', function(ev) {
            if(ev.target.className.includes('particle')) {
                ev.target.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
