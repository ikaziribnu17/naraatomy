<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis 3: Sortir Materi - ATOMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --blue-light: #82B2D8;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --bg-white: #F2F3F6;
            --error-red: #e74c3c;
            --success-green: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container 16:9 KONSISTEN */
        .canvas {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background-image: url('https://raw.githubusercontent.com/ikaziribnu17/xsinuli1/69ec1cd9663e74c43854b5606158d8219a8e26fd/unnamed.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 35, 55, 0.75);
            z-index: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 45px; 
            position: relative;
            z-index: 5;
            justify-content: space-between;
        }

        /* Header Misi */
        .header-section {
            text-align: center;
            margin-bottom: 5px;
        }

        .header-title {
            color: white;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 2px;
        }

        .header-title span { color: var(--accent-orange); }

        .header-subtitle {
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 500;
        }

        /* AREA GAME SORTIR */
        .game-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            border-top: 6px solid var(--cyan);
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        /* Keranjang Kelompok Materi */
        .baskets-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            flex: 1;
        }

        .basket {
            border: 3px dashed var(--blue-medium);
            border-radius: 15px;
            background-color: rgba(101, 134, 177, 0.05);
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .basket h3 {
            text-align: center;
            color: var(--navy);
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--blue-light);
            padding-bottom: 5px;
        }

        .basket-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        /* Item yang bisa ditarik (Drag Items) */
        .items-bank {
            background-color: #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            min-height: 80px;
        }

        .drag-item {
            background-color: var(--accent-orange);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 15px;
            cursor: grab;
            box-shadow: 0 4px 0px #c99347;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        .drag-item:active {
            cursor: grabbing;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 2px 0px #c99347;
        }

        .item-icon {
            font-size: 20px;
        }

        /* Area Tombol Bawah */
        .bottom-actions {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(5px);
        }

        .btn-back:hover {
            background-color: white;
            color: var(--navy);
            transform: translateX(-3px);
        }

        /* Animasi Salah */
        .error-shake {
            animation: shake 0.4s;
            background-color: var(--error-red) !important;
            box-shadow: 0 4px 0px #b03a2e !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
        }

        /* POPUP SUKSES */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 30, 50, 0.85);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            background: #ffffff;
            width: 450px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 10px solid var(--success-green);
        }

        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-content h2 { color: var(--success-green); font-size: 28px; margin-bottom: 15px; font-weight: 800; }
        .modal-content p { color: var(--navy); font-size: 16px; margin-bottom: 25px; font-weight: 500; }

        .btn-next-quiz {
            background-color: var(--accent-orange);
            color: white;
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 0px #c48a30;
            transition: all 0.3s;
        }

        .btn-next-quiz:hover {
            background-color: #f2bc6b;
            transform: translateY(-2px);
            box-shadow: 0 7px 0px #c48a30;
        }

    </style>
</head>
<body>

    <div class="canvas">
        <div class="main-content">
            
            <div class="header-section">
                <h1 class="header-title">Sortir Materi, <span id="playerNameDisplay">Pelajar</span>!</h1>
                <p class="header-subtitle">Tarik benda-benda di bawah ke dalam keranjang klasifikasi yang tepat.</p>
            </div>

            <div class="game-area">
                
                <div class="baskets-container">
                    <div class="basket" data-target="unsur" ondrop="drop(event)" ondragover="allowDrop(event)">
                        <h3>Unsur</h3>
                        <div class="basket-zone"></div>
                    </div>
                    
                    <div class="basket" data-target="senyawa" ondrop="drop(event)" ondragover="allowDrop(event)">
                        <h3>Senyawa</h3>
                        <div class="basket-zone"></div>
                    </div>
                    
                    <div class="basket" data-target="campuran" ondrop="drop(event)" ondragover="allowDrop(event)">
                        <h3>Campuran</h3>
                        <div class="basket-zone"></div>
                    </div>
                </div>

                <div class="items-bank">
                    <div class="drag-item" id="item1" data-type="unsur" draggable="true" ondragstart="drag(event)">
                        <span class="item-icon">🪙</span> Emas (Au)
                    </div>
                    <div class="drag-item" id="item2" data-type="campuran" draggable="true" ondragstart="drag(event)">
                        <span class="item-icon">☕</span> Kopi Hitam
                    </div>
                    <div class="drag-item" id="item3" data-type="senyawa" draggable="true" ondragstart="drag(event)">
                        <span class="item-icon">💧</span> Air (H₂O)
                    </div>
                    <div class="drag-item" id="item4" data-type="unsur" draggable="true" ondragstart="drag(event)">
                        <span class="item-icon">🔩</span> Besi (Fe)
                    </div>
                    <div class="drag-item" id="item5" data-type="campuran" draggable="true" ondragstart="drag(event)">
                        <span class="item-icon">💨</span> Udara
                    </div>
                    <div class="drag-item" id="item6" data-type="senyawa" draggable="true" ondragstart="drag(event)">
                        <span class="item-icon">🧂</span> Garam (NaCl)
                    </div>
                </div>

            </div>

            <div class="bottom-actions">
                <button class="btn-action btn-back" onclick="window.location.href='kuis 1 memasang atom.html'">
                    ⬅ KEMBALI KE MENU KUIS
                </button>
            </div>

        </div>

        <div class="modal-overlay" id="successPopup">
            <div class="modal-content">
                <h2>🌟 Klasifikasi Sempurna!</h2>
                <p>Kamu berhasil membedakan Unsur, Senyawa, dan Campuran dengan sangat teliti!</p>
                <button class="btn-next-quiz" onclick="window.location.href='kuis 3 pemisahan campuran.html'">
                    LANJUT KE KUIS 4 (PEMISAHAN) ➔
                </button>
            </div>
        </div>
    </div>

    <script>
        // Mengambil nama dari Halaman Login
        document.addEventListener("DOMContentLoaded", function() {
            const savedName = sessionStorage.getItem('xmatter_name');
            if (savedName && savedName.trim() !== "") {
                document.getElementById('playerNameDisplay').innerText = savedName;
            }
        });

        let correctItems = 0;
        const totalItems = 6; // Jumlah benda yang harus disortir

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.style.opacity = "0.5";
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drop(ev) {
            ev.preventDefault();
            const draggedId = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(draggedId);
            
            // Mencari elemen keranjang tempat benda dijatuhkan
            const basket = ev.target.closest('.basket');
            if (!basket) return;

            draggedElement.style.opacity = "1";

            const expectedType = basket.getAttribute('data-target');
            const itemType = draggedElement.getAttribute('data-type');

            // Cek kebenaran (Unsur masuk ke keranjang Unsur, dsb.)
            if (expectedType === itemType) {
                // Jawaban Benar
                const zone = basket.querySelector('.basket-zone');
                zone.appendChild(draggedElement);
                
                // Matikan fitur drag untuk elemen ini agar menetap di keranjang
                draggedElement.setAttribute('draggable', 'false');
                draggedElement.style.cursor = 'default';
                draggedElement.style.boxShadow = 'none';
                draggedElement.style.margin = '0';
                
                correctItems++;
                checkWin();
            } else {
                // Jawaban Salah
                draggedElement.classList.add('error-shake');
                setTimeout(() => draggedElement.classList.remove('error-shake'), 400);
            }
        }

        // Cek jika semua benda sudah tersortir
        function checkWin() {
            if (correctItems === totalItems) {
                setTimeout(() => {
                    document.getElementById('successPopup').classList.add('active');
                }, 500);
            }
        }

        // Mengembalikan opacity jika drag batal
        document.addEventListener('dragend', function(ev) {
            if(ev.target.classList.contains('drag-item')) {
                ev.target.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
