<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Utama - ATOMY: Unsur, Senyawa, & Campuran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- KESEPAKATAN GAYA GLOBAL --- */
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --blue-light: #82B2D8;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --text-dark: #2C3E50;
            --bg-white: #FFFFFF;
        }

        /* Mencegah browser HP memperbesar ukuran font secara otomatis */
        html, body {
            -webkit-text-size-adjust: 100%;
            -moz-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        /* Container Kanvas 16:9 DENGAN LATAR GELAP KONSISTEN */
        .canvas {
            width: 95vw;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background-image: url('https://raw.githubusercontent.com/ikaziribnu17/xsinuli1/69ec1cd9663e74c43854b5606158d8219a8e26fd/unnamed.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            padding: 40px;
        }

        /* Overlay Gelap */
        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 35, 55, 0.75);
            z-index: 1;
        }

        /* --- LAYOUT UTAMA --- */
        .main-content {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 10;
            position: relative;
            gap: 40px;
        }

        /* PANEL KIRI: Animasi Atom */
        .left-panel {
            flex: 0.7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Ukuran untuk gambar GIF Atom */
        .mascot-big {
            width: 250px; 
            height: auto;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .mascot-base {
            width: 160px;
            height: 20px;
            background: radial-gradient(ellipse at center, rgba(38, 165, 203, 0.5) 0%, transparent 70%);
            margin-top: 10px;
            border-radius: 50%;
            animation: shadow-pulse 4s ease-in-out infinite;
        }

        @keyframes shadow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(0.8); opacity: 0.3; }
        }

        /* PANEL KANAN: Judul & Menu */
        .right-panel {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0; /* Penting untuk scroll di HP */
        }

        /* Sapaan Nama dari Halaman Login */
        .welcome-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14.5px;
            font-weight: 500;
            margin-bottom: 15px;
            border: 1px solid var(--cyan);
            backdrop-filter: blur(5px);
            width: max-content;
            max-width: 100%; /* Mencegah meluber di HP */
            white-space: normal; /* Izinkan teks turun ke bawah jika panjang */
        }

        /* Judul Besar */
        .title-section {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .app-title {
            font-size: 52px;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .app-title span {
            color: var(--accent-orange);
        }

        .app-subtitle {
            font-size: 20px;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        .title-divider {
            width: 100px;
            height: 5px;
            background: var(--accent-orange);
            border-radius: 5px;
            margin-top: 15px;
        }

        /* Grid 6 Menu Utama (BISA DI-SCROLL DI HP) */
        .scrollable-menu {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .scrollable-menu::-webkit-scrollbar { width: 6px; }
        .scrollable-menu::-webkit-scrollbar-track { background: transparent; }
        .scrollable-menu::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }

        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-bottom: 10px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid transparent;
            border-radius: 15px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: var(--cyan);
            background: white;
            box-shadow: 0 10px 20px rgba(38, 165, 203, 0.4);
        }

        .menu-icon {
            font-size: 32px;
            background: rgba(38, 165, 203, 0.15);
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .menu-card:hover .menu-icon {
            background: var(--cyan);
            transform: scale(1.1) rotate(5deg);
        }

        .menu-text {
            font-size: 15px;
            font-weight: 800;
            color: var(--navy);
        }

        /* --- MENU BAWAH (KECIL) --- */
        .bottom-nav {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .btn-small {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-small:hover {
            background: white;
            color: var(--navy);
            transform: translateY(-2px);
        }

        .btn-exit {
            background: rgba(231, 76, 60, 0.2);
            color: #ff7675;
            border-color: rgba(231, 76, 60, 0.5);
        }

        .btn-exit:hover {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        /* TAMPILAN KHUSUS HP (RESPONSIF) */
        @media (max-width: 768px) {
            .canvas {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                aspect-ratio: auto;
                border-radius: 0;
                padding: 20px;
            }
            .main-content {
                flex-direction: column;
                gap: 20px;
            }
            .left-panel {
                flex: none; /* Animasi pindah ke atas di HP */
                height: auto;
            }
            .mascot-big {
                width: 110px; /* Ukuran GIF diperkecil di HP */
            }
            .mascot-base {
                width: 80px;
                height: 10px;
            }
            .right-panel {
                flex: 1;
            }
            .app-title {
                font-size: 38px;
            }
            .app-subtitle {
                font-size: 16px;
            }
            .main-menu-grid {
                grid-template-columns: repeat(2, 1fr); /* 6 Menu menjadi 2 kolom di HP */
            }
            .bottom-nav {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="main-content">
            
            <div class="left-panel">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2b/Atom_animation.gif" alt="Animasi Struktur Atom" class="mascot-big">
                <div class="mascot-base"></div>
            </div>

            <div class="right-panel">
                
                <div class="title-section">
                    <div class="welcome-badge" id="welcomeBox" style="display: none;">
                        <span id="welcomeText">Halo!</span>
                    </div>
                    
                    <h1 class="app-title">ATO<span>MY</span></h1>
                    <h2 class="app-subtitle">Unsur, Senyawa, dan Campuran</h2>
                    <div class="title-divider"></div>
                </div>

                <div class="scrollable-menu">
                    <div class="main-menu-grid">
                        <div class="menu-card" onclick="window.location.href='menu 1 pendahuluan.html'">
                            <div class="menu-icon">📜</div>
                            <div class="menu-text">Pendahuluan</div>
                        </div>
                        <div class="menu-card" onclick="window.location.href='menu 2 kompetensi 1 CP ATP.html'">
                            <div class="menu-icon">🎯</div>
                            <div class="menu-text">Kompetensi</div>
                        </div>
                        <div class="menu-card" onclick="window.location.href='menu 3 materi 5 modul.html'">
                            <div class="menu-icon">📚</div>
                            <div class="menu-text">Materi</div>
                        </div>
                        <div class="menu-card" onclick="window.location.href='kuis 1 memasang atom.html'">
                            <div class="menu-icon">🧩</div>
                            <div class="menu-text">Kuis</div>
                        </div>
                        <div class="menu-card" onclick="window.location.href='menu 5 halaman awal evaluasi.html'">
                            <div class="menu-icon">📝</div>
                            <div class="menu-text">Evaluasi</div>
                        </div>
                        <div class="menu-card" onclick="window.location.href='menu 6 refleksi.html'">
                            <div class="menu-icon">💡</div>
                            <div class="menu-text">Refleksi</div>
                        </div>
                    </div>
                </div>

                <div class="bottom-nav">
                    <button class="btn-small" onclick="window.location.href='info pengembang.html'">
                        <span>ℹ️</span> Info Aplikasi
                    </button>
                    <button class="btn-small" onclick="window.location.href='halaman petunjuk navigasi.html'">
                        <span>❓</span> Petunjuk
                    </button>
                    <button class="btn-small" onclick="window.location.href='halaman pustaka.html'">
                        <span>📖</span> Referensi
                    </button>
                    <button class="btn-small btn-exit" onclick="keluarAplikasi()">
                        <span>🚪</span> Keluar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Mengambil data dari SessionStorage (yang disimpan saat login)
            const savedName = sessionStorage.getItem('xmatter_name') || 'Pelajar';
            const savedSchool = sessionStorage.getItem('xmatter_school'); 
            
            // Logika Penyusunan Kalimat Sambutan
            let greetingHTML = `Selamat Datang, <strong style="color: var(--accent-orange); font-weight: 700;">${savedName}</strong>! 👋`;
            
            // Jika siswa mengisi nama sekolah di halaman login, tampilkan juga
            if (savedSchool && savedSchool.trim() !== "") {
                greetingHTML = `Halo selamat datang, <strong style="color: var(--accent-orange); font-weight: 700;">${savedName}</strong> dari <strong style="color: var(--cyan); font-weight: 700;">${savedSchool}</strong>! 👋`;
            }

            document.getElementById('welcomeText').innerHTML = greetingHTML;
            document.getElementById('welcomeBox').style.display = 'inline-block';
        };

        function keluarAplikasi() {
        if(confirm('Apakah Anda yakin ingin keluar dari aplikasi ATOMY?')) {
                // 1. Menghapus data sesi (nama & sekolah) agar harus login ulang
                sessionStorage.clear();
                
                // 2. Langsung arahkan kembali ke halaman login
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
