<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis 1: Nomor Massa - ATOMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #3D5474;
            --blue-medium: #6586B1;
            --cyan: #26A5CB;
            --accent-orange: #EFB25B;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
            --bg-white: #F2F3F6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container 16:9 KONSISTEN */
        .canvas {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background-image: url('https://raw.githubusercontent.com/ikaziribnu17/xsinuli1/69ec1cd9663e74c43854b5606158d8219a8e26fd/unnamed.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 35, 55, 0.7); /* Overlay gelap transparan */
            z-index: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px 45px; 
            position: relative;
            z-index: 5;
            justify-content: space-between;
        }

        /* Header Misi */
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 15px;
            border-left: 5px solid var(--accent-orange);
        }

        .mascot {
            font-size: 50px;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.3));
        }

        .instruction {
            color: white;
            flex: 1;
        }

        .instruction h2 { font-size: 24px; color: var(--accent-orange); margin-bottom: 5px; font-weight: 800;}
        .instruction p { font-size: 16px; color: #e2e8f0; font-weight: 500;}

        /* Area Target Unsur */
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex: 1;
            align-items: center;
        }

        .element-card {
            background-color: rgba(255, 255, 255, 0.95);
            width: 150px;
            height: 200px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 3px solid transparent;
            border-top: 8px solid var(--cyan);
            transition: transform 0.3s ease;
        }

        .element-card:hover {
            transform: translateY(-5px);
            border-color: var(--cyan);
        }

        .element-symbol {
            font-size: 50px;
            font-weight: 800;
            color: var(--navy);
            line-height: 1;
        }

        .element-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--blue-medium);
            margin-bottom: 10px;
        }

        .element-proton {
            font-size: 18px;
            font-weight: 700;
            color: var(--navy);
            position: absolute;
            bottom: 40px;
            left: 25px;
        }

        /* Target Drop Zone (Slot untuk Angka) */
        .drop-slot {
            width: 60px;
            height: 45px;
            background: rgba(38, 165, 203, 0.1);
            border: 2px dashed var(--blue-medium);
            border-radius: 8px;
            position: absolute;
            top: 20px;
            left: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .drop-slot.filled {
            background: transparent;
            border: none;
        }

        /* Bank Pilihan (Bawah) */
        .options-bank {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            min-height: 80px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 15px;
            align-items: center;
        }

        .drag-chip {
            background-color: var(--accent-orange);
            color: white;
            font-size: 18px;
            font-weight: 700;
            width: 55px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            cursor: grab;
            box-shadow: 0 4px 0px #c99347;
            user-select: none;
            transition: transform 0.1s;
        }

        .drag-chip:active {
            cursor: grabbing;
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 2px 0px #c99347;
        }

        /* Area Tombol Bawah */
        .bottom-actions {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(5px);
        }

        .btn-back:hover {
            background-color: white;
            color: var(--navy);
            transform: translateX(-3px);
        }

        /* Animasi Salah */
        .error-shake {
            animation: shake 0.4s;
            border-color: var(--error-red) !important;
            background-color: rgba(231, 76, 60, 0.1) !important;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* POPUP SUKSES */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 30, 50, 0.85);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #ffffff;
            width: 450px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 10px solid var(--success-green);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h2 { color: var(--success-green); font-size: 28px; margin-bottom: 15px; font-weight: 800; }
        .modal-content p { color: var(--navy); font-size: 16px; margin-bottom: 25px; font-weight: 500; }

        .btn-next-quiz {
            background-color: var(--accent-orange);
            color: white;
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 0px #c48a30;
            transition: all 0.3s;
        }

        .btn-next-quiz:hover {
            background-color: #f2bc6b;
            transform: translateY(-2px);
            box-shadow: 0 7px 0px #c48a30;
        }

    </style>
</head>
<body>

    <div class="canvas">
        <div class="main-content">
            
            <div class="header-section">
                <div class="mascot">🔢</div>
                <div class="instruction">
                    <h2>Halo, <span id="playerNameDisplay">Pelajar</span>!</h2>
                    <p>Lengkapi notasi atom di bawah ini! Tarik (drag) angka nomor massa yang tepat ke kotak kosong di setiap unsur.</p>
                </div>
            </div>

            <div class="cards-container">
                
                <div class="element-card">
                    <div class="drop-slot" data-expected="16" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    <div class="element-symbol">O</div>
                    <div class="element-name">Oksigen</div>
                    <div class="element-proton">8</div>
                </div>

                <div class="element-card">
                    <div class="drop-slot" data-expected="11" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    <div class="element-symbol">B</div>
                    <div class="element-name">Boron</div>
                    <div class="element-proton">5</div>
                </div>

                <div class="element-card">
                    <div class="drop-slot" data-expected="23" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    <div class="element-symbol">Na</div>
                    <div class="element-name">Natrium</div>
                    <div class="element-proton">11</div>
                </div>

                <div class="element-card">
                    <div class="drop-slot" data-expected="26" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    <div class="element-symbol">Mg</div>
                    <div class="element-name">Magnesium</div>
                    <div class="element-proton">12</div>
                </div>

                <div class="element-card">
                    <div class="drop-slot" data-expected="56" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    <div class="element-symbol">Fe</div>
                    <div class="element-name">Besi</div>
                    <div class="element-proton">26</div>
                </div>

            </div>

            <div class="options-bank" id="optionsBank">
                </div>

            <div class="bottom-actions">
                <button class="btn-action btn-back" onclick="window.location.href='kuis 1 memasang atom.html'">
                    ⬅ KEMBALI KE MENU KUIS
                </button>
            </div>

        </div>

        <div class="modal-overlay" id="successPopup">
            <div class="modal-content">
                <h2>🌟 Jawaban Akurat!</h2>
                <p>Kamu berhasil mencocokkan seluruh nomor massa atom dengan tepat. Lanjutkan misimu!</p>
                <button class="btn-next-quiz" onclick="window.location.href='game 1 memasang atom.html'">
                    LANJUT KE KUIS 2 (PUZZLE ATOM) ➔
                </button>
            </div>
        </div>
    </div>

    <script>
        // Mengambil nama dari Halaman Login
        document.addEventListener("DOMContentLoaded", function() {
            const savedName = sessionStorage.getItem('xmatter_name');
            if (savedName && savedName.trim() !== "") {
                document.getElementById('playerNameDisplay').innerText = savedName;
            }
        });

        // Generate Angka Acak untuk Bank Jawaban
        const numbers = [16, 11, 23, 26, 56];
        let correctPlacements = 0;

        // Mengacak array (Fisher-Yates Shuffle)
        for (let i = numbers.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
        }

        const bank = document.getElementById('optionsBank');
        numbers.forEach(num => {
            const chip = document.createElement('div');
            chip.className = 'drag-chip';
            chip.id = 'num' + num;
            chip.innerText = num;
            chip.setAttribute('data-value', num);
            chip.setAttribute('draggable', 'true');
            chip.ondragstart = drag;
            bank.appendChild(chip);
        });

        // Fungsi Drag & Drop
        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.style.opacity = "0.5";
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drop(ev) {
            ev.preventDefault();
            const draggedId = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(draggedId);
            const slot = ev.target;
            
            draggedElement.style.opacity = "1";

            const expectedValue = slot.getAttribute('data-expected');
            const droppedValue = draggedElement.getAttribute('data-value');

            // Cek apakah angka yang dimasukkan benar
            if (expectedValue === droppedValue && !slot.hasChildNodes()) {
                // Jawaban Benar
                slot.appendChild(draggedElement);
                slot.classList.add('filled');
                
                draggedElement.setAttribute('draggable', 'false');
                draggedElement.style.cursor = 'default';
                draggedElement.style.boxShadow = 'none';
                draggedElement.style.transform = 'none';

                correctPlacements++;
                checkWin();
            } else {
                // Jawaban Salah
                slot.classList.add('error-shake');
                setTimeout(() => slot.classList.remove('error-shake'), 400);
            }
        }

        function checkWin() {
            if (correctPlacements === numbers.length) {
                setTimeout(() => {
                    document.getElementById('successPopup').classList.add('active');
                }, 500);
            }
        }

        // Mengembalikan opacity jika batal digeser
        document.addEventListener('dragend', function(ev) {
            if(ev.target.className.includes('drag-chip')) {
                ev.target.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
